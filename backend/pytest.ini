[pytest]
asyncio_mode = auto
testpaths = tests
addopts = -ra --strict-markers --cov=runllm --cov-report=term-missing
# Don't fail when no tests are collected (empty scaffold).
# pytest exits with code 5 by default; remap to 0.
# This is achieved with the `--exitfirst` alternative below.
filterwarnings =
    ignore::DeprecationWarning

